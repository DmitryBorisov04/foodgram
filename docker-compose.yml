volumes:
  pg_data:
  static:
  media:
  frontend_static:

services:
  db:
    image: postgres:13.10
    env_file: backend/.env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: backend/.env
    depends_on:
      - db
    volumes:
      - static:/backend_static
      - media:/app/media

  frontend:
    build: ./frontend
    volumes:
      - frontend_static:/frontend_static

  gateway:
    build: ./gateway
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - static:/backend_static
      - media:/media
      - frontend_static:/usr/share/nginx/html