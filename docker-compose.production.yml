volumes:
  pg_data:
  static:
  media:
  frontend_static:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always
    networks:
      - foodgram_network

  backend:
    image: ${DOCKERHUB_USERNAME}/foodgram_backend:latest
    env_file: .env
    depends_on:
      - db
    volumes:
      - static:/backend_static
      - media:/app/media
    restart: always
    networks:
      - foodgram_network

  frontend:
    image: ${DOCKERHUB_USERNAME}/foodgram_frontend:latest
    volumes:
      - frontend_static:/frontend_static
    restart: "no"
    networks:
      - foodgram_network

  gateway:
    image: ${DOCKERHUB_USERNAME}/foodgram_gateway:latest
    depends_on:
      - backend
      - frontend
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - static:/backend_static
      - media:/media
      - frontend_static:/usr/share/nginx/html
    restart: always
    networks:
      - foodgram_network

networks:
  foodgram_network: